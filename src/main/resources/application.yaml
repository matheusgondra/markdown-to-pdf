spring:
  application:
    name: md2pdf
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  output:
    ansi:
      enabled: ALWAYS

springdoc:
  api-docs:
    path: /api-docs

scalar:
  path: /docs
  theme: bluePlanet
  dark-mode: true
  pageTitle: Markdown to PDF API Documentation